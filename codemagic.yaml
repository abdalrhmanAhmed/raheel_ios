workflows:
  ios-build:
    name: iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        IOS_DEPLOYMENT_TARGET: 14.0
    scripts:
      - name: Install dependencies
        script: |
          flutter clean
          flutter pub get
          cd ios
          echo "platform :ios, '$IOS_DEPLOYMENT_TARGET'" > Podfile.tmp
          tail -n +2 Podfile >> Podfile.tmp
          mv Podfile.tmp Podfile
          pod deintegrate
          pod install
          cd ..
      - name: Build iOS
        script: flutter build ios --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/*.ipa

